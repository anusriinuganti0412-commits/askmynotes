<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f7f4;
        }

        .container{
            width:380px;
            background:#ffffff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            color:#2e7d32;
            margin-bottom:10px;
        }

        h1{
            text-align:center;
            font-size:28px;
            color:#333;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#555;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#4CAF50;
            outline:none;
            box-shadow:0 0 6px rgba(76,175,80,0.3);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#28a745;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#218838;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Sign Up</h2>
    <h1>Create Account</h1>

    <form>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit">Sign Up</button>

    </form>

</div>

</body>
</html>
